kind = "video"
previewPath = "/deal-scout-brand-video/"
title = "Deal Scout Brand Awareness Video"
version = "1.0.0"
id = "artifacts/deal-scout-brand-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/deal-scout-brand-video/" ]
localPort = 19115

[services.development]
run = "pnpm --filter @workspace/deal-scout-brand-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/deal-scout-brand-video", "run", "build" ]
publicDir = "artifacts/deal-scout-brand-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19115"
BASE_PATH = "/deal-scout-brand-video/"
