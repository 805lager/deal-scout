kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
build = "pip install -r artifacts/deal-scout-api/requirements.txt"

[services.production.run]
args = ["sh", "-c", "cd /home/runner/workspace/artifacts/deal-scout-api && uvicorn main:app --host 0.0.0.0 --port 8080"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/health"
