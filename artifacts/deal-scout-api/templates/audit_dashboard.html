<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deal Scout — Score Audit</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e0e0e0;padding:20px;line-height:1.5}
a{color:#7c8cf8;text-decoration:none}
h1{font-size:22px;color:#fff;margin-bottom:4px}
.subtitle{color:#888;font-size:13px}

.top-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px}
.top-bar-left{display:flex;align-items:center;gap:16px}
.badge{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:2px 10px;font-size:12px;color:#94a3b8}
.badge.new{background:#10b981;color:#fff;border-color:#10b981;font-weight:600}
.btn{padding:8px 18px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.btn-primary{background:#10b981;color:#fff}.btn-primary:hover{background:#059669}
.btn-primary:disabled{background:#334155;color:#64748b;cursor:not-allowed}
.btn-secondary{background:#1e293b;color:#94a3b8;border:1px solid #334155}.btn-secondary:hover{background:#334155}
.btn-sm{padding:4px 12px;font-size:11px}
.btn-danger{background:#dc2626;color:#fff}.btn-danger:hover{background:#b91c1c}

/* Health Snapshot */
.snapshot{background:linear-gradient(180deg,#161b22 0%,#1a1d27 100%);border:1px solid #2a2d3a;border-radius:10px;padding:16px 18px;margin-bottom:18px}
.snapshot-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.snapshot-status{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600}
.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.status-dot.healthy{background:#10b981;box-shadow:0 0 8px #10b98166}
.status-dot.warning{background:#f59e0b;box-shadow:0 0 8px #f59e0b66}
.status-dot.critical{background:#ef4444;box-shadow:0 0 8px #ef444466}
.status-dot.unknown{background:#64748b}
.status-text.healthy{color:#10b981}
.status-text.warning{color:#f59e0b}
.status-text.critical{color:#ef4444}
.status-text.unknown{color:#94a3b8}
.snapshot-meta{font-size:11px;color:#64748b}
.snapshot-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.snap-cell{background:#0f1117;border:1px solid #2a2d3a;border-radius:8px;padding:10px 12px}
.snap-label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.snap-value{font-size:20px;font-weight:700;color:#fff;line-height:1.1}
.snap-value.green{color:#10b981}
.snap-value.yellow{color:#f59e0b}
.snap-value.red{color:#ef4444}
.snap-sub{font-size:10px;color:#64748b;margin-top:3px}

.findings-panel{background:#1a1d27;border:1px solid #2a2d3a;border-radius:8px;padding:16px;margin-bottom:18px;display:none}
.findings-panel.visible{display:block}
.findings-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.findings-header h2{font-size:16px;color:#fff}
.finding{background:#0f1117;border:1px solid #2a2d3a;border-radius:6px;padding:12px;margin-bottom:8px}
.finding.critical{border-left:3px solid #ef4444}
.finding.warning{border-left:3px solid #f59e0b}
.finding.info{border-left:3px solid #3b82f6}
.finding-title{font-weight:600;font-size:13px;color:#fff}
.finding-meta{font-size:11px;color:#64748b;margin-top:2px}
.finding-desc{font-size:12px;color:#cbd5e1;margin-top:6px}
.finding-fix{font-size:11px;color:#10b981;margin-top:4px;font-style:italic}
.sev-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;margin-left:8px}
.sev-badge.critical{background:#dc262633;color:#ef4444}
.sev-badge.warning{background:#f59e0b33;color:#f59e0b}
.sev-badge.info{background:#3b82f633;color:#3b82f6}

/* Tabbed telemetry */
.telemetry-section{background:#161b22;border:1px solid #2a2d3a;border-radius:8px;margin-bottom:18px;overflow:hidden}
.tab-bar{display:flex;border-bottom:1px solid #2a2d3a;background:#1a1d27}
.tab{padding:10px 18px;font-size:12px;font-weight:600;color:#64748b;cursor:pointer;border-right:1px solid #2a2d3a;text-transform:uppercase;letter-spacing:.4px;transition:all .15s;user-select:none}
.tab:hover{color:#94a3b8;background:#1e293b}
.tab.active{color:#10b981;background:#161b22;border-bottom:2px solid #10b981;margin-bottom:-1px}
.tab-content{display:none;padding:14px}
.tab-content.active{display:block}
.tab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.telem-card{background:#0f1117;border:1px solid #2a2d3a;border-radius:8px;padding:12px}
.telem-card h3{font-size:11px;color:#64748b;text-transform:uppercase;margin-bottom:8px;letter-spacing:.4px}
.telem-bar{display:flex;align-items:center;gap:8px;margin:3px 0;font-size:12px}
.telem-bar-fill{height:6px;border-radius:3px;background:#10b981}
.telem-bar-label{min-width:90px;color:#94a3b8;text-transform:capitalize}
.telem-bar-val{color:#fff;font-weight:600;min-width:30px;text-align:right}

.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center}
.filters select,.filters input{background:#1a1d27;border:1px solid #334155;color:#e0e0e0;padding:5px 8px;border-radius:4px;font-size:12px}
.filters label{font-size:11px;color:#64748b}

table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1a1d27;color:#64748b;text-align:left;padding:8px 6px;font-size:11px;text-transform:uppercase;letter-spacing:.3px;position:sticky;top:0;cursor:pointer;user-select:none;border-bottom:1px solid #2a2d3a;z-index:1}
th:hover{color:#94a3b8}
td{padding:6px;border-bottom:1px solid #1a1d27;vertical-align:top}
tr.anomaly-critical{background:#dc262610}
tr.anomaly-warning{background:#f59e0b08}
tr:hover{background:#1e293b}
tr.expanded{background:#1a1d27}
.expand-row{display:none}
.expand-row.visible{display:table-row}
.expand-content{padding:16px;background:#0f1117;border-radius:6px}
/* Hideable columns — toggled by .show-extra on body */
body:not(.show-extra) .col-extra{display:none}

.score-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-weight:700;font-size:11px}
.score-pill.great{background:#10b98133;color:#10b981}
.score-pill.good{background:#22c55e33;color:#22c55e}
.score-pill.fair{background:#f59e0b33;color:#f59e0b}
.score-pill.bad{background:#ef444433;color:#ef4444}

.version-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;background:#1e293b;color:#64748b;border:1px solid #334155}
.version-badge.current{background:#10b98122;color:#10b981;border-color:#10b981}

.anomaly-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.anomaly-dot.critical{background:#ef4444}
.anomaly-dot.warning{background:#f59e0b}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.detail-section{background:#1a1d27;border-radius:6px;padding:12px}
.detail-section h4{font-size:12px;color:#64748b;text-transform:uppercase;margin-bottom:8px;letter-spacing:.3px}
.detail-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;border-bottom:1px solid #1a1d2780}
.detail-row .label{color:#64748b}.detail-row .value{color:#e0e0e0;font-weight:500}
.flag-list{list-style:none;padding:0}.flag-list li{padding:2px 0;font-size:12px}
.green-flag{color:#10b981}.red-flag{color:#ef4444}

.rescore-panel{margin-top:12px;padding:12px;background:#1e293b;border-radius:6px;display:none}
.rescore-panel.visible{display:block}
.diff-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid #2a2d3a}
.diff-old{color:#ef4444;text-decoration:line-through}.diff-new{color:#10b981;font-weight:600}
.diff-same{color:#64748b}

.loading{display:inline-block;width:16px;height:16px;border:2px solid #334155;border-top-color:#10b981;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.empty-state{text-align:center;padding:40px;color:#64748b;font-size:14px}
.table-wrap{overflow-x:auto;max-height:70vh;overflow-y:auto;border:1px solid #2a2d3a;border-radius:8px}
</style>
</head>
<body>
<div class="top-bar">
  <div class="top-bar-left">
    <div>
      <h1>Score Audit Dashboard</h1>
      <div class="subtitle">Review scoring quality, spot issues, verify fixes</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <select id="versionFilter" title="Backend version filter" onchange="loadData()">
      <option value="">All versions</option>
    </select>
    <label style="font-size:12px;color:#64748b">
      <input type="checkbox" id="reviewAll" style="margin-right:4px">Review all
    </label>
    <button class="btn btn-primary" id="checkBtn" onclick="runCheck()">
      Check Scores Now
    </button>
  </div>
</div>

<!-- Health Snapshot -->
<div class="snapshot">
  <div class="snapshot-head">
    <div class="snapshot-status">
      <span class="status-dot unknown" id="statusDot"></span>
      <span class="status-text unknown" id="statusText">Loading…</span>
    </div>
    <div class="snapshot-meta" id="statusMeta"></div>
  </div>
  <div class="snapshot-grid" id="snapshotGrid"></div>
</div>

<div class="findings-panel" id="findingsPanel">
  <div class="findings-header">
    <h2>Audit Findings</h2>
    <span id="findingsCount" style="font-size:12px;color:#64748b"></span>
  </div>
  <div id="findingsList"></div>
</div>

<!-- Tabbed telemetry -->
<div class="telemetry-section">
  <div class="tab-bar">
    <div class="tab active" data-tab="quality" onclick="switchTab('quality')">Quality</div>
    <div class="tab" data-tab="performance" onclick="switchTab('performance')">Performance</div>
    <div class="tab" data-tab="versions" onclick="switchTab('versions')">Versions</div>
  </div>
  <div class="tab-content active" id="tab-quality"></div>
  <div class="tab-content" id="tab-performance"></div>
  <div class="tab-content" id="tab-versions"></div>
</div>

<div class="filters">
  <label>Platform:
    <select id="fPlatform"><option value="">All</option></select>
  </label>
  <label>Data Source:
    <select id="fSource"><option value="">All</option></select>
  </label>
  <label>Confidence:
    <select id="fConf"><option value="">All</option>
      <option value="high">high</option><option value="medium">medium</option>
      <option value="low">low</option><option value="none">none</option>
    </select>
  </label>
  <label>Score:
    <input type="number" id="fScoreMin" placeholder="min" style="width:50px" min="1" max="10">
    <span style="color:#64748b">-</span>
    <input type="number" id="fScoreMax" placeholder="max" style="width:50px" min="1" max="10">
  </label>
  <label>
    <input type="checkbox" id="fAnomalyOnly" style="margin-right:4px">Anomalies only
  </label>
  <label>
    <select id="fThumbs"><option value="">All feedback</option>
      <option value="up">Thumbs up</option><option value="down">Thumbs down</option>
      <option value="none">Unrated</option>
    </select>
  </label>
  <label>Date:
    <input type="date" id="fDateFrom" style="width:120px">
    <span style="color:#64748b">-</span>
    <input type="date" id="fDateTo" style="width:120px">
  </label>
  <label style="margin-left:auto">
    <input type="checkbox" id="showExtra" style="margin-right:4px" onchange="toggleExtraCols()">Show all columns
  </label>
</div>

<div class="table-wrap">
<table id="scoreTable">
<thead>
<tr>
  <th data-col="flags" style="width:30px"></th>
  <th data-col="_server_ts">Time</th>
  <th data-col="title">Title</th>
  <th data-col="price">Price</th>
  <th data-col="platform">Platform</th>
  <th data-col="score">Score</th>
  <th data-col="verdict">Verdict</th>
  <th data-col="data_source">Source</th>
  <th data-col="market_confidence">Conf</th>
  <th data-col="estimated_value" class="col-extra">Est Value</th>
  <th data-col="sold_avg">Sold Avg</th>
  <th data-col="sold_count">Sold#</th>
  <th data-col="active_count" class="col-extra">Active#</th>
  <th data-col="security_score" class="col-extra">Sec</th>
  <th data-col="photo_count" class="col-extra">Photos</th>
  <th data-col="category" class="col-extra">Category</th>
  <th data-col="total_ms" class="col-extra">Time(ms)</th>
  <th data-col="backend_version" class="col-extra">Ver</th>
</tr>
</thead>
<tbody id="scoreBody"></tbody>
</table>
</div>

<script>
const API_KEY = '{{API_KEY}}';
const CURRENT_VERSION = '{{CURRENT_VERSION}}';
const BASE = window.location.pathname.replace(/\/admin\/audit\/?$/, '');

let allScorecards = [];
let allReview = null;
let lastTelem = null;
let sortCol = '_server_ts';
let sortAsc = false;

// Restore "show all columns" pref
try {
  if (localStorage.getItem('ds_audit_show_extra') === '1') {
    document.body.classList.add('show-extra');
  }
} catch(_) {}
document.addEventListener('DOMContentLoaded', () => {
  const cb = document.getElementById('showExtra');
  if (cb) cb.checked = document.body.classList.contains('show-extra');
});

function toggleExtraCols() {
  const on = document.getElementById('showExtra').checked;
  document.body.classList.toggle('show-extra', on);
  try { localStorage.setItem('ds_audit_show_extra', on ? '1' : '0'); } catch(_) {}
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + name));
  try { localStorage.setItem('ds_audit_tab', name); } catch(_) {}
}

function headers() {
  return {'Content-Type':'application/json','X-DS-Key':API_KEY};
}

function fmt$(v) {
  if (v == null || v === 0) return '—';
  return '$' + Number(v).toLocaleString(undefined, {maximumFractionDigits:0});
}

function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' +
         d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

function scorePill(s) {
  if (s == null) return '<span class="score-pill fair">—</span>';
  const c = s >= 7 ? 'great' : s >= 5 ? 'good' : s >= 3 ? 'fair' : 'bad';
  return `<span class="score-pill ${c}">${s}</span>`;
}

function versionBadge(v) {
  const cls = v === CURRENT_VERSION ? 'current' : '';
  return `<span class="version-badge ${cls}">${v||'?'}</span>`;
}

function detectAnomalies(sc) {
  const flags = [];
  const l = sc.listing||{}, ds = sc.deal_score||{}, pc = sc.price_comparison||{}, sec = sc.security||{}, aff = sc.affiliate_cards||[];
  const price = l.price||0, score = ds.score||0, src = pc.data_source||'', conf = pc.market_confidence||'',
        est = pc.estimated_value||0, sold = pc.sold_count||0, photos = l.photo_count||0,
        secScore = typeof sec==='object' ? (sec.score??10) : 10;

  if (src==='vehicle_not_applicable') flags.push({rule:'vehicle_stub',severity:'critical'});
  if (sold===0 && !['claude_knowledge','claude_grounded','vehicle_not_applicable'].includes(src))
    flags.push({rule:'no_comp_data',severity:'critical'});
  if (conf==='none') flags.push({rule:'zero_confidence',severity:'warning'});
  if (est===0 && price>20) flags.push({rule:'zero_value',severity:'warning'});
  if (photos<=1 && price>50) flags.push({rule:'low_photos',severity:'warning'});
  if (score>=7 && est>0 && price>est) flags.push({rule:'score_price_high',severity:'warning'});
  if (score<=4 && est>0 && price<est*0.6) flags.push({rule:'score_price_low',severity:'warning'});
  if (secScore<=3) flags.push({rule:'security_critical',severity:'critical'});
  if (aff.length===0) flags.push({rule:'missing_affiliates',severity:'info'});

  const cat = (ds.category||'').toLowerCase();
  if (cat && aff.length>0) {
    const affText = aff.map(a=>(a.title||'')+' '+(a.search_query||'')).join(' ').toLowerCase();
    const pairs = [
      [['vehicle','car','truck','rv','trailer','motorcycle'],['electronics','phone','laptop','camera']],
      [['electronics','phone','laptop','computer','tablet'],['vehicle','car','truck','furniture']],
      [['furniture','couch','sofa','table','chair'],['electronics','phone','laptop','vehicle']],
    ];
    for (const [catKw, badKw] of pairs) {
      if (catKw.some(k=>cat.includes(k))) {
        if (badKw.some(k=>affText.includes(k)))
          flags.push({rule:'category_affiliate_mismatch',severity:'warning'});
        break;
      }
    }
  }
  return flags;
}

function getFilteredScorecards() {
  const pf = document.getElementById('fPlatform').value;
  const sf = document.getElementById('fSource').value;
  const cf = document.getElementById('fConf').value;
  const sMin = parseInt(document.getElementById('fScoreMin').value) || 0;
  const sMax = parseInt(document.getElementById('fScoreMax').value) || 99;
  const ao = document.getElementById('fAnomalyOnly').checked;
  const vf = document.getElementById('versionFilter').value;
  const tf = document.getElementById('fThumbs').value;
  const dateFrom = document.getElementById('fDateFrom').value;
  const dateTo = document.getElementById('fDateTo').value;

  return allScorecards.filter(sc => {
    const l = sc.listing||{}, ds = sc.deal_score||{}, pc = sc.price_comparison||{}, meta = sc.metadata||{};
    if (pf && l.platform !== pf) return false;
    if (sf && pc.data_source !== sf) return false;
    if (cf && pc.market_confidence !== cf) return false;
    if (vf && meta.backend_version !== vf) return false;
    const score = ds.score || 0;
    if (score < sMin || score > sMax) return false;
    if (ao && detectAnomalies(sc).length === 0) return false;
    if (tf) {
      const fb = meta.user_feedback || 'none';
      if (tf === 'up' && fb !== 'up') return false;
      if (tf === 'down' && fb !== 'down') return false;
      if (tf === 'none' && fb !== 'none' && fb !== undefined) return false;
    }
    if (dateFrom || dateTo) {
      const ts = sc._server_ts ? new Date(sc._server_ts) : null;
      if (!ts) return false;
      if (dateFrom && ts < new Date(dateFrom)) return false;
      if (dateTo) { const end = new Date(dateTo); end.setDate(end.getDate()+1); if (ts >= end) return false; }
    }
    return true;
  });
}

function renderTable() {
  const filtered = getFilteredScorecards();

  filtered.sort((a,b) => {
    let va, vb;
    if (sortCol === '_server_ts') { va = a._server_ts||''; vb = b._server_ts||''; }
    else if (sortCol === 'title') { va = (a.listing||{}).title||''; vb = (b.listing||{}).title||''; }
    else if (sortCol === 'price') { va = (a.listing||{}).price||0; vb = (b.listing||{}).price||0; }
    else if (sortCol === 'platform') { va = (a.listing||{}).platform||''; vb = (b.listing||{}).platform||''; }
    else if (sortCol === 'score') { va = (a.deal_score||{}).score||0; vb = (b.deal_score||{}).score||0; }
    else if (sortCol === 'data_source') { va = (a.price_comparison||{}).data_source||''; vb = (b.price_comparison||{}).data_source||''; }
    else if (sortCol === 'market_confidence') { va = (a.price_comparison||{}).market_confidence||''; vb = (b.price_comparison||{}).market_confidence||''; }
    else if (sortCol === 'estimated_value') { va = (a.price_comparison||{}).estimated_value||0; vb = (b.price_comparison||{}).estimated_value||0; }
    else if (sortCol === 'sold_avg') { va = (a.price_comparison||{}).sold_avg||0; vb = (b.price_comparison||{}).sold_avg||0; }
    else if (sortCol === 'sold_count') { va = (a.price_comparison||{}).sold_count||0; vb = (b.price_comparison||{}).sold_count||0; }
    else if (sortCol === 'security_score') {
      const sa = a.security||{}; va = typeof sa==='object'?(sa.score??0):0;
      const sb = b.security||{}; vb = typeof sb==='object'?(sb.score??0):0;
    }
    else if (sortCol === 'photo_count') { va = (a.listing||{}).photo_count||0; vb = (b.listing||{}).photo_count||0; }
    else if (sortCol === 'category') { va = ((a.product_info||{}).category)||''; vb = ((b.product_info||{}).category)||''; }
    else if (sortCol === 'total_ms') { va = (a.metadata||{}).total_ms||0; vb = (b.metadata||{}).total_ms||0; }
    else if (sortCol === 'backend_version') { va = (a.metadata||{}).backend_version||''; vb = (b.metadata||{}).backend_version||''; }
    else { va = 0; vb = 0; }
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va - vb : vb - va;
  });

  const body = document.getElementById('scoreBody');
  body.innerHTML = '';

  if (filtered.length === 0) {
    body.innerHTML = '<tr><td colspan="18" class="empty-state">No scores match the current filters. Try clearing the version or date filter, or scoring a few listings to populate this view.</td></tr>';
    return;
  }

  filtered.forEach(sc => {
    const l = sc.listing||{}, ds = sc.deal_score||{}, pc = sc.price_comparison||{},
          sec = sc.security||{}, meta = sc.metadata||{}, pi = sc.product_info||{},
          pe = sc.product_evaluation||{}, aff = sc.affiliate_cards||[];
    const flags = detectAnomalies(sc);
    const worstSev = flags.find(f=>f.severity==='critical') ? 'critical' : (flags.length ? 'warning' : '');
    const secScore = typeof sec==='object' ? sec.score : null;

    const flagDots = flags.filter(f=>f.severity!=='info').map(f=>`<span class="anomaly-dot ${f.severity}" title="${f.rule}"></span>`).join('');

    tr.innerHTML = `
      <td>${flagDots}</td>

    body.appendChild(tr);

    const expandTr = document.createElement('tr');
    expandTr.className = 'expand-row';
    expandTr.id = `expand-${id}`;
    expandTr.innerHTML = `<td colspan="18">${buildExpandContent(sc, flags)}</td>`;
    body.appendChild(expandTr);
  });
}

function toggleExpand(id) {
  const el = document.getElementById(`expand-${id}`);
  if (!el) return;
  const isVisible = el.classList.contains('visible');
  document.querySelectorAll('.expand-row.visible').forEach(e => e.classList.remove('visible'));
  document.querySelectorAll('tr.expanded').forEach(e => e.classList.remove('expanded'));
  if (!isVisible) {
    el.classList.add('visible');
    const row = document.getElementById(`row-${id}`);
    if (row) row.classList.add('expanded');
  }
}

function jumpToRow(id) {
  const row = document.getElementById(`row-${id}`);
  if (row) {
    row.scrollIntoView({behavior:'smooth', block:'center'});
    toggleExpand(id);
    row.style.outline = '2px solid #f59e0b';
    setTimeout(() => { row.style.outline = ''; }, 3000);
  }
}

async function rescore(id) {
  const panel = document.getElementById(`rescore-${id}`);
  if (!panel) return;
  panel.className = 'rescore-panel visible';
  panel.innerHTML = '<div style="display:flex;align-items:center;gap:8px"><div class="loading"></div> Re-scoring through current pipeline...</div>';

  try {
    const resp = await fetch(`${BASE}/admin/audit/rescore`, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({score_log_id: id}),
    });
    const data = await resp.json();
    if (data.error) {
      panel.innerHTML = `<div style="color:#ef4444">Error: ${data.error}</div>`;
      return;
    }

    const diff = data.diff || {};
    const newR = data.new_response || {};
    const changes = diff.field_changes || [];
    const hasFlags = diff.green_flags || diff.red_flags;

    if (changes.length === 0 && !hasFlags) {
      panel.innerHTML = '<div style="color:#10b981;font-weight:600">✓ No changes — current pipeline produces the same result</div>';
      return;
    }

    let html = `<div style="margin-bottom:8px;font-weight:600;color:#f59e0b">Score: ${diff.score_old??'—'} → ${diff.score_new??'—'} | Source: ${esc(diff.data_source_old)||'—'} → ${esc(diff.data_source_new)||'—'}</div>`;
    for (const fc of changes) {
      html += `<div class="diff-row"><span style="color:#94a3b8">${esc(fc.field)}</span><span><span class="diff-old">${esc(String(fc.old??'—'))}</span> → <span class="diff-new">${esc(String(fc.new??'—'))}</span></span></div>`;
    }
    if (diff.green_flags) {
      html += `<div style="padding:4px 0;font-size:12px"><strong style="color:#94a3b8">green_flags:</strong>`;
      (diff.green_flags.removed||[]).forEach(f => { html += `<div style="color:#ef4444;margin-left:12px">− ${esc(f)}</div>`; });
      (diff.green_flags.added||[]).forEach(f => { html += `<div style="color:#10b981;margin-left:12px">+ ${esc(f)}</div>`; });
      html += '</div>';
    }
    if (diff.red_flags) {
      html += `<div style="padding:4px 0;font-size:12px"><strong style="color:#94a3b8">red_flags:</strong>`;
      (diff.red_flags.removed||[]).forEach(f => { html += `<div style="color:#ef4444;margin-left:12px">− ${esc(f)}</div>`; });
      (diff.red_flags.added||[]).forEach(f => { html += `<div style="color:#10b981;margin-left:12px">+ ${esc(f)}</div>`; });
      html += '</div>';
    }
    if (diff.affiliate_cards) {
      html += `<div style="padding:4px 0;font-size:12px"><strong style="color:#94a3b8">affiliate_cards:</strong>`;
      (diff.affiliate_cards.removed||[]).forEach(f => { html += `<div style="color:#ef4444;margin-left:12px">− ${esc(f)}</div>`; });
      (diff.affiliate_cards.added||[]).forEach(f => { html += `<div style="color:#10b981;margin-left:12px">+ ${esc(f)}</div>`; });
      html += '</div>';
    }
    html += `<div style="margin-top:8px;font-size:11px;color:#64748b">New score: ${scorePill(newR.score)} | Source: ${esc(newR.data_source)||'—'} | Confidence: ${esc(newR.market_confidence)||'—'} | Version: ${esc(newR.backend_version)||'—'}</div>`;
    panel.innerHTML = html;
  } catch(e) {
    panel.innerHTML = `<div style="color:#ef4444">Error: ${e.message}</div>`;
  }
}

async function runCheck() {
  const btn = document.getElementById('checkBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="loading" style="display:inline-block;vertical-align:middle;margin-right:6px"></div>Checking...';

  const version = document.getElementById('versionFilter').value || null;
  const reviewAll = document.getElementById('reviewAll').checked;

  try {
    const resp = await fetch(`${BASE}/admin/audit/check`, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({version: version, review_all: reviewAll, limit: 50}),
    });
    const data = await resp.json();

    if (data.error) {
      alert(data.error);
      btn.disabled = false;
      btn.textContent = 'Check Scores Now';
      return;
    }

    const panel = document.getElementById('findingsPanel');
    const list = document.getElementById('findingsList');
    const count = document.getElementById('findingsCount');

    panel.classList.add('visible');
    count.textContent = `${data.findings.length} issue(s) found in ${data.reviewed_count} scores`;

    if (data.findings.length === 0) {
      list.innerHTML = '<div class="empty-state" style="padding:20px">No issues found — all reviewed scores look correct.</div>';
    } else {
      const grouped = {};
      data.findings.forEach(f => {
        const t = f.issue_type || 'other';
        if (!grouped[t]) grouped[t] = [];
        grouped[t].push(f);
      });
      list.innerHTML = Object.entries(grouped).map(([type, items]) => `
        <div style="margin-bottom:12px">
          <div style="font-weight:600;font-size:13px;color:#f59e0b;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px">${esc(type)} (${items.length})</div>
          ${items.map(f => `
            <div class="finding ${esc(f.severity)}" style="cursor:pointer" onclick="jumpToRow(${f.id})">
              <div class="finding-title">${esc(f.title)||'Unknown'} — ${fmt$(f.price)}<span class="sev-badge ${esc(f.severity)}">${esc(f.severity)}</span></div>
              <div class="finding-meta">Score Log #${f.id} — click to view</div>
              <div class="finding-desc">${esc(f.description)}</div>
              ${f.suggested_fix ? `<div class="finding-fix">Fix: ${esc(f.suggested_fix)}</div>` : ''}
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    loadData();
  } catch(e) {
    alert('Check failed: ' + e.message);
  }

  btn.disabled = false;
  btn.textContent = 'Check Scores Now';
}

function barChart(data) {
  const entries = Object.entries(data || {});
  if (!entries.length) return '<div style="color:#64748b;font-size:12px">No data</div>';
  const maxVal = Math.max(...entries.map(([,v]) => v), 1);
  return entries.map(([k,v]) =>
    `<div class="telem-bar">
      <span class="telem-bar-label">${esc(k)||'unknown'}</span>
      <div style="flex:1;background:#1e293b;border-radius:3px;height:6px">
        <div class="telem-bar-fill" style="width:${Math.round(v/maxVal*100)}%"></div>
      </div>
      <span class="telem-bar-val">${v}</span>
    </div>`
  ).join('');
}

      <div class="detail-row"><span class="label">Confidence Δ</span><span class="value" style="color:${(telem.version_comparison.confidence_delta||0)>=0?'#10b981':'#ef4444'}">${telem.version_comparison.confidence_delta>0?'+':''}${telem.version_comparison.confidence_delta??'—'}%</span></div>
      <div class="detail-row"><span class="label">Anomaly Rate Δ</span><span class="value" style="color:${(telem.version_comparison.anomaly_rate_delta||0)<=0?'#10b981':'#ef4444'}">${telem.version_comparison.anomaly_rate_delta>0?'+':''}${telem.version_comparison.anomaly_rate_delta??'—'}%</span></div>
    </div>
  ` : '';

  document.getElementById('tab-versions').innerHTML = `
    <div class="tab-grid">
      <div class="telem-card" style="grid-column:1/-1">
        <h3>Live API Version: ${versionBadge(CURRENT_VERSION)}</h3>
        <div style="font-size:11px;color:#64748b;margin-top:4px">Stamped on every score from this deploy. If newer scores aren't showing this version, the API hasn't been redeployed since the version bump.</div>
      </div>
      <div class="telem-card" style="grid-column:1/-1">
        <h3>Version History</h3>
        ${versionRows}
      </div>
      ${compHtml}
    </div>
  `;
}

function renderHealthSnapshot(reviewData, telem, newCount, versionFilter) {
  const stats = (reviewData && reviewData.stats) || {};
  const dsGlobal = (telem && telem.deal_scores) || {};
  const trend = (telem && telem.daily_trend) || [];

  // When a version filter is active, derive total / thumbs / avg from the
  // version-scoped scorecards so snapshot numbers don't mix filtered review
  // stats with unfiltered telemetry totals (e.g. avoids showing
  // "Reviewed 3 of 480" where 480 is all-version total but the 3 is v-only).
  let ds = dsGlobal;
  if (versionFilter) {
    const scoped = (allScorecards || []).filter(sc => (sc.metadata||{}).backend_version === versionFilter);
    let up = 0, down = 0, scoreSum = 0, scoreN = 0;
    scoped.forEach(sc => {
      const fb = (sc.metadata||{}).user_feedback;
      if (fb === 'up') up++;
      else if (fb === 'down') down++;
      const s = (sc.deal_score||{}).score;
      if (typeof s === 'number') { scoreSum += s; scoreN++; }
    });
    ds = {
      total: scoped.length,
      avg_score: scoreN ? +(scoreSum/scoreN).toFixed(2) : null,
      thumbs_up: up,
      thumbs_down: down,
      unrated: scoped.length - up - down,
    };
  }

  // Most recent day in trend = "today / last 24h" bucket.
  // /admin/audit/telemetry returns daily_trend in ASC order (ORDER BY day),
  // so the latest day is the LAST element, not the first.
  const latest = trend.length ? trend[trend.length - 1] : null;
  const today24h = latest ? (latest.count || 0) : 0;
  const todayAvg = latest ? latest.avg_score : null;

  const anomalyRateRaw = stats.anomaly_rate || '0%';
  const anomalyPct = parseFloat(anomalyRateRaw) || 0;
  const anomalyColor = anomalyPct > 30 ? 'red' : anomalyPct > 15 ? 'yellow' : 'green';

  const statusLevel = anomalyPct > 30 ? 'critical'
                     : anomalyPct > 15 ? 'warning'
                     : (ds.total||0) === 0 ? 'unknown'
                     : 'healthy';
  const statusLabel = {
    healthy: 'Healthy — scores look consistent',
    warning: 'Issues found — review anomalies',
    critical: 'Critical — high anomaly rate',
    unknown: 'No score data yet',
  }[statusLevel];

  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ' + statusLevel;
  txt.className = 'status-text ' + statusLevel;
  txt.textContent = statusLabel;
  const scopeLabel = versionFilter ? `version ${versionFilter}` : 'all versions';
  document.getElementById('statusMeta').textContent =
    `Reviewed ${stats.total_reviewed||0} of ${ds.total||0} ${scopeLabel} · refreshed ${new Date().toLocaleTimeString()}`;

  const thumbsUp = ds.thumbs_up || 0;
  const thumbsDown = ds.thumbs_down || 0;
  const thumbsTotal = thumbsUp + thumbsDown;
  const thumbsPct = thumbsTotal ? Math.round(thumbsUp / thumbsTotal * 100) : null;

  document.getElementById('snapshotGrid').innerHTML = `
    <div class="snap-cell">
      <div class="snap-label">Live API Version</div>
      <div class="snap-value">${versionBadge(CURRENT_VERSION)}</div>
      <div class="snap-sub">From VERSION file</div>
    </div>
    <div class="snap-cell">
      <div class="snap-label">Scores · last 24h</div>
      <div class="snap-value">${today24h}</div>
      <div class="snap-sub">avg ${todayAvg??'—'}</div>
    </div>
    <div class="snap-cell">
      <div class="snap-label">Anomaly Rate</div>
      <div class="snap-value ${anomalyColor}">${anomalyRateRaw}</div>
      <div class="snap-sub">${stats.anomaly_count||0} of ${stats.total_reviewed||0} reviewed</div>
    </div>
    <div class="snap-cell">
      <div class="snap-label">Avg Score</div>
      <div class="snap-value">${stats.avg_score ?? ds.avg_score ?? '—'}</div>
      <div class="snap-sub">All reviewed</div>
    </div>
    <div class="snap-cell">
      <div class="snap-label">User Feedback</div>
      <div class="snap-value">${thumbsPct!=null?thumbsPct+'%':'—'}</div>
      <div class="snap-sub">👍 ${thumbsUp} · 👎 ${thumbsDown}</div>
    </div>
    <div class="snap-cell">
      <div class="snap-label">New since review</div>
      <div class="snap-value ${newCount>0?'yellow':'green'}">${newCount||0}</div>
      <div class="snap-sub">${newCount>0?'Click "Check Scores Now"':'All reviewed'}</div>
    </div>
  `;
}

async function _safeFetchJson(url) {
  try {
    const r = await fetch(url, {headers: headers()});
    if (!r.ok) return {__error: `HTTP ${r.status}`};
    return await r.json();
  } catch(e) {
    return {__error: e.message || String(e)};
  }
}

async function loadData() {
  try {
    const vSelEl = document.getElementById('versionFilter');
    // First-load default: pre-seed CURRENT_VERSION into the dropdown BEFORE
    // computing `vf`, so review/snapshot/new-since-review data is filtered
    // to match the version that the UI is showing as selected. Without this,
    // the first fetch would be unfiltered ("All versions") while the dropdown
    // visually shows the current version, misleading the snapshot stats.
    const isFirstLoad = vSelEl.options.length <= 1;
    if (isFirstLoad && CURRENT_VERSION) {
      const opt = document.createElement('option');
      opt.value = CURRENT_VERSION;
      opt.textContent = CURRENT_VERSION + ' (current)';
      vSelEl.appendChild(opt);
      vSelEl.value = CURRENT_VERSION;
    }
    const vf = vSelEl.value;
    const reviewUrl = vf ? `${BASE}/admin/audit/review?version=${encodeURIComponent(vf)}` : `${BASE}/admin/audit/review`;

    // Fetch all three independently so a failure in one panel (e.g.
    // telemetry) doesn't blank the whole dashboard. Each panel renders
    // with whatever data successfully loaded; failed sections show an
    // inline notice instead of taking down the table.
    const [reviewData, telemData, scoreLogData] = await Promise.all([
      _safeFetchJson(reviewUrl),
      _safeFetchJson(`${BASE}/admin/audit/telemetry`),
      _safeFetchJson(`${BASE}/score-log`),
    ]);
    const reviewErr = reviewData.__error;
    const telemErr = telemData.__error;
    const scoreLogErr = scoreLogData.__error;
    const reviewSafe = reviewErr ? {anomalies: [], stats: {}} : reviewData;
    const telemSafe = telemErr ? {deal_scores:{}, daily_trend:[], data_sources:{}, confidence:{}, platforms:{}, timing:{}, price_cache:{}, versions:[]} : telemData;
    lastTelem = telemSafe;
    allScorecards = scoreLogErr ? [] : (scoreLogData.scorecards || []);

    const feedbackById = {};
    const feedbackByUrl = {};
    (reviewSafe.anomalies || []).forEach(a => {
      const sc = a.scorecard;
      if (sc && sc.metadata && sc.metadata.user_feedback) {
        if (sc._id) feedbackById[sc._id] = sc.metadata.user_feedback;
        const url = (sc.listing||{}).listing_url;
        if (url) feedbackByUrl[url] = sc.metadata.user_feedback;
      }
    });
    allScorecards.forEach(sc => {
      const fb = feedbackById[sc._id] || feedbackByUrl[(sc.listing||{}).listing_url];
      if (fb) {
        if (!sc.metadata) sc.metadata = {};
        sc.metadata.user_feedback = fb;
      }
    });

    const versions = new Set();
    const platforms = new Set();
    const sources = new Set();
    allScorecards.forEach(sc => {
      const v = (sc.metadata||{}).backend_version;
      if (v) versions.add(v);
      const p = (sc.listing||{}).platform;
      if (p) platforms.add(p);
      const s = (sc.price_comparison||{}).data_source;
      if (s) sources.add(s);
    });
    // Always include the live API version in the dropdown, even before any
    // score has been stamped with it (e.g. immediately after a redeploy).
    if (CURRENT_VERSION) versions.add(CURRENT_VERSION);

    // Rebuild the version dropdown with the full list, preserving whatever is
    // currently selected (which on first load is already CURRENT_VERSION,
    // pre-seeded above so the data fetch matched the UI selection).
    const vSel = vSelEl;
    const prevVal = vSel.value;
    vSel.innerHTML = '<option value="">All versions</option>';
    [...versions].sort().reverse().forEach(v => {
      const opt = document.createElement('option');
      opt.value = v;
      opt.textContent = v + (v === CURRENT_VERSION ? ' (current)' : '');
      vSel.appendChild(opt);
    });
    vSel.value = prevVal;

    const pSel = document.getElementById('fPlatform');
    pSel.innerHTML = '<option value="">All</option>';
    [...platforms].sort().forEach(p => { pSel.innerHTML += `<option value="${p}">${p}</option>`; });

    const sSel = document.getElementById('fSource');
    sSel.innerHTML = '<option value="">All</option>';
    [...sources].sort().forEach(s => { sSel.innerHTML += `<option value="${s}">${s}</option>`; });

    allReview = reviewSafe;

    const lastId = telemSafe.last_reviewed_id || 0;
    const newCount = allScorecards.filter(sc => sc._id > lastId && (!vf || (sc.metadata||{}).backend_version === vf)).length;

    renderHealthSnapshot(reviewSafe, telemSafe, newCount, vf);
    renderTelemetry(telemSafe);
    renderTable();

    // Surface per-panel failures inline without blanking the rest of the UI.
    if (telemErr) {
      const note = `<div style="background:#dc262622;border:1px solid #ef4444;color:#fca5a5;padding:8px 12px;border-radius:6px;margin-top:8px;font-size:12px">Telemetry unavailable: ${esc(telemErr)} (charts/cards will be empty until the next reload)</div>`;
      document.getElementById('tab-quality').insertAdjacentHTML('afterbegin', note);
    }
    if (reviewErr) {
      const note = `<div style="background:#dc262622;border:1px solid #ef4444;color:#fca5a5;padding:8px 12px;border-radius:6px;margin-top:8px;font-size:12px">Review data unavailable: ${esc(reviewErr)}</div>`;
      document.getElementById('snapshotGrid').insertAdjacentHTML('afterend', note);
    }
    if (scoreLogErr) {
      const body = document.getElementById('scoreBody');
      body.innerHTML = `<tr><td colspan="18" class="empty-state" style="color:#ef4444">Score log unavailable: ${esc(scoreLogErr)}</td></tr>`;
    }
  } catch(e) {
    console.error('Load failed:', e);
    document.getElementById('snapshotGrid').innerHTML =
      `<div class="snap-cell"><div class="snap-label">Error</div><div class="snap-value red">${esc(e.message)}</div></div>`;
  }
}

document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (col === 'flags') return;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = false; }
    renderTable();
  });
});

document.querySelectorAll('.filters select, .filters input').forEach(el => {
  el.addEventListener('change', renderTable);
});

// Restore last-active tab
try {
  const saved = localStorage.getItem('ds_audit_tab');
  if (saved && ['quality','performance','versions'].includes(saved)) switchTab(saved);
} catch(_) {}

loadData();
</script>
