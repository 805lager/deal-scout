<!DOCTYPE html>
<!--
  eBay Fashion listing fixture — relative-time "Listed N days ago" form.
  Common on fashion / clothing category pages within the first ~30
  days of a listing's life, where eBay surfaces a freshness signal
  rather than an absolute date.
-->
<html>
<head><title>Coach Leather Crossbody Bag Black NWT | eBay</title></head>
<body>

    <div id="LeftSummaryPanel">
      <div class="x-item-title">
        <h1 class="x-item-title__mainTitle">
          <span class="ux-textspans ux-textspans--BOLD">Coach Leather Crossbody Bag Black NWT</span>
        </h1>
      </div>
      <div class="x-price-primary">
        <span class="ux-textspans ux-textspans--BOLD">$129.00</span>
      </div>
      <div class="x-item-condition">
        <span class="x-item-condition-text">
          <span class="ux-textspans">New with tags</span>
        </span>
      </div>
      <div class="ux-layout-section__item">
        <span class="ux-textspans ux-textspans--SECONDARY">Listed 3 days ago</span>
      </div>
      <div class="ux-layout-section__item">
        <span class="ux-textspans">Item location: Los Angeles, CA, United States</span>
      </div>
    </div>
  </main>
</body>
</html>
