<!DOCTYPE html>
<!--
  eBay Electronics listing fixture — month-first "Listed on" date.
  Real-world template observed on consumer electronics category pages
  where eBay renders the date without a weekday prefix:
  "Listed on Apr 15, 2025".
-->
<html>
<head><title>Apple iPhone 13 Pro 256GB Unlocked | eBay</title></head>
<body>
  <main>
    <div id="LeftSummaryPanel">
      <div class="x-item-title">
        <h1 class="x-item-title__mainTitle">
          <span class="ux-textspans ux-textspans--BOLD">Apple iPhone 13 Pro 256GB Sierra Blue Unlocked</span>
        </h1>
      </div>
      <div class="x-price-primary">
        <span class="ux-textspans ux-textspans--BOLD">$549.99</span>
      </div>
      <div class="x-item-condition">
        <span class="x-item-condition-text">
          <span class="ux-textspans">Seller refurbished</span>
        </span>
      </div>
      <div class="ux-layout-section__item">
        <span class="ux-textspans ux-textspans--SECONDARY">Listed on Apr 15, 2025</span>
      </div>
      <div class="ux-layout-section__item">
        <span class="ux-textspans">Item location: Brooklyn, NY, United States</span>
      </div>
    </div>
  </main>
</body>
</html>
