<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deal Scout</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      min-height: 200px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      color: #111827;
      background: #fff;
    }
    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { color: #fff; font-size: 16px; font-weight: 700; }
    .header .version { color: rgba(255,255,255,0.6); font-size: 11px; }
    .body { padding: 16px; }
    .status-card {
      background: #f8fafc;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #6b7280;
    }
    .status-card.active { background: #f0fdf4; color: #15803d; }
    .status-card.error  { background: #fef2f2; color: #dc2626; }
    .platform-list { margin-bottom: 16px; }
    .platform {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
      font-size: 13px;
    }
    .platform .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }
    .platform .dot.off { background: #d1d5db; }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      margin-bottom: 8px;
    }
    .btn.secondary {
      background: #f3f4f6;
      color: #374151;
    }
    .footer {
      padding: 10px 16px;
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
      border-top: 1px solid #f3f4f6;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🛒 Deal Scout</h1>
    <span class="version">v0.1.0</span>
  </div>

  <div class="body">
    <!-- API Status -->
    <div id="api-status" class="status-card">
      ⏳ Checking API connection...
    </div>

    <!-- Supported Platforms -->
    <div class="platform-list">
      <div style="font-weight:600;font-size:12px;color:#6b7280;margin-bottom:6px">SUPPORTED PLATFORMS</div>
      <div class="platform">
        <span>📘 Facebook Marketplace</span>
        <div class="dot" title="Active"></div>
      </div>
      <div class="platform">
        <span>📋 Craigslist</span>
        <div class="dot" title="Active"></div>
      </div>
      <div class="platform">
        <span>🛒 Amazon (retail anchor)</span>
        <div class="dot" title="Active"></div>
      </div>
      <div class="platform">
        <span>🏷️ OfferUp</span>
        <div class="dot off" title="Coming soon"></div>
      </div>
    </div>

    <!-- Actions -->
    <a id="open-scorer" class="btn" href="http://localhost:3000" target="_blank">
      Open Full Scorer
    </a>
    <button id="score-current" class="btn secondary">
      Score Current Page
    </button>
  </div>

  <div class="footer">
    Browse any listing — Deal Scout scores it automatically
  </div>

  <script src="popup.js"></script>
</body>
</html>
